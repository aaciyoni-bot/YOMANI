<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יומן פרויקטים חכם</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Babel (Reliable CDNJS version) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap');
        body {
            font-family: 'Heebo', sans-serif;
            background-color: #f8fafc;
            margin: 0;
            overflow: hidden;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .modal-enter {
            animation: fadeIn 0.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; height: 100vh; width: 100vw; align-items: center; justify-content: center; background-color: #f8fafc; flex-direction: column;">
            <i class="fas fa-circle-notch fa-spin text-blue-500 text-4xl mb-4"></i>
            <h2 class="text-xl font-bold text-slate-700 font-sans" id="loading-text">טוען מערכת חכמה...</h2>
            <p class="text-slate-500 mt-2 font-sans">מעבד נתונים ומתחבר לענן, אנא המתן.</p>
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from "https://esm.sh/react@18.2.0";
        import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration dynamically loaded from environment
        let firebaseConfig = null;
        try {
            if (typeof __firebase_config !== 'undefined') {
                firebaseConfig = JSON.parse(__firebase_config);
            }
        } catch (e) {
            console.error("Error parsing firebase config", e);
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        
        let app, auth, db;
        if (firebaseConfig) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("React Error Caught:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-red-50 flex items-center justify-center p-4" dir="rtl">
                            <div className="bg-white p-8 rounded-2xl shadow-xl border border-red-200 max-w-lg w-full">
                                <div className="text-red-500 mb-4"><i className="fas fa-exclamation-triangle text-5xl"></i></div>
                                <h1 className="text-2xl font-bold text-slate-800 mb-2">אופס, שגיאת תצוגה!</h1>
                                <p className="text-slate-600 mb-4">המערכת נתקלה בשגיאה בעת ניסיון להציג את התוכן.</p>
                                <div className="bg-slate-900 text-green-400 p-4 rounded-xl font-mono text-sm overflow-x-auto text-left" dir="ltr">
                                    {this.state.error?.toString()}
                                </div>
                                <button onClick={() => window.location.reload()} className="mt-6 bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg font-bold transition-colors w-full">
                                    רענן עמוד ונסה שוב
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const INITIAL_PROJECTS = [
            { id: '1', name: 'TOURIZIS אתר', description: '', status: 'רעיון', priority: 'בינונית', tasks: [], codeSnippet: '', logs: [] },
            { id: '2', name: 'כרטיסי גירוד - קמפיין תרומות', description: '', status: 'רעיון', priority: 'בינונית', tasks: [], codeSnippet: '', logs: [] },
            { id: '3', name: 'TOPHANEGEV אתר', description: '', status: 'רעיון', priority: 'בינונית', tasks: [], codeSnippet: '', logs: [] },
            { id: '4', name: 'ORIZISCAP אתר', description: '', status: 'רעיון', priority: 'בינונית', tasks: [], codeSnippet: '', logs: [] },
            { id: '5', name: 'אתר לניתוח מכרזים', description: '', status: 'רעיון', priority: 'בינונית', tasks: [], codeSnippet: '', logs: [] },
            { id: '6', name: 'ORIZISREAL אתר', description: '', status: 'רעיון', priority: 'בינונית', tasks: [], codeSnippet: '', logs: [] },
            { id: '7', name: 'סיבריז - קמפיינים', description: '', status: 'רעיון', priority: 'בינונית', tasks: [], codeSnippet: '', logs: [] },
            { id: '8', name: 'NETABEL - אתר התחשבנות', description: '', status: 'רעיון', priority: 'בינונית', tasks: [], codeSnippet: '', logs: [] },
            { id: '9', name: 'MYHOME - אתר דרופ', description: '', status: 'רעיון', priority: 'בינונית', tasks: [], codeSnippet: '', logs: [] },
            { id: '10', name: 'VERISESS אתר', description: '', status: 'רעיון', priority: 'בינונית', tasks: [], codeSnippet: '', logs: [] },
            { id: '11', name: 'ZEDMALL', description: '', status: 'רעיון', priority: 'בינונית', tasks: [], codeSnippet: '', logs: [] },
            { id: '12', name: 'COLLEXEN אתר', description: '', status: 'רעיון', priority: 'בינונית', tasks: [], codeSnippet: '', logs: [] },
        ];

        const FALLBACK_USERS = {
            'ADMIN1': { password: 'ADMIN111', role: 'superadmin' },
            'ADMIN2': { password: 'ADMIN', role: 'user' }
        };

        function App() {
            const [dbUser, setDbUser] = useState(null);
            
            const [projects, setProjects] = useState([]);
            const [activeProjectId, setActiveProjectId] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            
            const [loggedInUser, setLoggedInUser] = useState(null);
            const [loggedInRole, setLoggedInRole] = useState(null);
            const [systemUsers, setSystemUsers] = useState({});
            const [usernameInput, setUsernameInput] = useState('');
            const [passwordInput, setPasswordInput] = useState('');
            const [loginError, setLoginError] = useState('');

            const [projectToDelete, setProjectToDelete] = useState(null);
            const [deleteRequestModalProject, setDeleteRequestModalProject] = useState(null);
            const [showUserModal, setShowUserModal] = useState(false);
            
            const [newUserName, setNewUserName] = useState('');
            const [newUserPass, setNewUserPass] = useState('');

            // Initialize Firebase Auth (Rule 3)
            useEffect(() => {
                if (!auth) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Authentication failed:", error);
                    }
                };
                initAuth();
                
                const unsubscribe = onAuthStateChanged(auth, (user) => {
                    setDbUser(user);
                });
                return () => unsubscribe();
            }, []);

            // Fetch System Users (Rule 1 & Rule 3)
            useEffect(() => {
                if (!dbUser || !db) {
                    setSystemUsers(FALLBACK_USERS);
                    return;
                }
                
                const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'systemUsers');
                const unsubscribe = onSnapshot(usersRef, (snapshot) => {
                    if (snapshot.empty) {
                        Object.entries(FALLBACK_USERS).forEach(([username, data]) => {
                            setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'systemUsers', username), data).catch(console.error);
                        });
                        setSystemUsers(FALLBACK_USERS);
                    } else {
                        const usersMap = {};
                        snapshot.forEach(d => {
                            usersMap[d.id] = d.data();
                        });
                        setSystemUsers(usersMap);
                    }
                }, (error) => {
                    console.warn("Users sync error:", error);
                    setSystemUsers(FALLBACK_USERS);
                });
                return () => unsubscribe();
            }, [dbUser]);

            // Fetch Projects (Rule 1 & Rule 3)
            useEffect(() => {
                if (!dbUser || !loggedInUser || !db) {
                    setProjects(INITIAL_PROJECTS);
                    return;
                }

                const projectsRef = collection(db, 'artifacts', appId, 'public', 'data', 'projects');
                const unsubscribe = onSnapshot(projectsRef, (snapshot) => {
                    const dbProjects = [];
                    snapshot.forEach((d) => {
                        dbProjects.push({ id: d.id, ...d.data() });
                    });

                    if (dbProjects.length === 0) {
                        INITIAL_PROJECTS.forEach(proj => {
                            setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', proj.id), proj).catch(console.error);
                        });
                        setProjects(INITIAL_PROJECTS);
                    } else {
                        dbProjects.sort((a, b) => parseInt(a.id) - parseInt(b.id));
                        setProjects(dbProjects);
                    }
                }, (error) => {
                     console.warn("Projects sync error:", error);
                     setProjects(INITIAL_PROJECTS);
                });

                return () => unsubscribe();
            }, [dbUser, loggedInUser]);

            const saveProjectToCloud = (proj) => {
                if (!dbUser || !db) return;
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', proj.id), proj).catch(console.error);
            };

            const addLog = (projectId, actionDescription) => {
                const timestamp = new Date().toLocaleString('he-IL');
                return {
                    id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
                    user: loggedInUser || 'Unknown',
                    action: actionDescription,
                    time: timestamp
                };
            };

            const getTaskMetrics = (tasks = []) => {
                if (!Array.isArray(tasks)) tasks = [];
                const total = tasks.length;
                const done = tasks.filter(t => t.isDone).length;
                const open = total - done;
                const overdue = tasks.filter(t => !t.isDone && isOverdue(t.dueDate)).length;
                return { total, done, open, overdue, progress: total === 0 ? 0 : Math.round((done / total) * 100) };
            };

            const isOverdue = (dateString) => {
                if (!dateString) return false;
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const dueDate = new Date(dateString);
                return dueDate < today;
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const userStr = (usernameInput || '').toUpperCase().trim();
                const userObj = systemUsers[userStr];
                
                if (userObj && userObj.password === passwordInput) {
                    setLoggedInUser(userStr);
                    setLoggedInRole(userObj.role || (userStr === 'ADMIN1' ? 'superadmin' : 'user'));
                    setLoginError('');
                } else {
                    setLoginError('שם משתמש או סיסמה שגויים');
                }
            };

            const handleLogout = () => {
                setLoggedInUser(null);
                setLoggedInRole(null);
                setUsernameInput('');
                setPasswordInput('');
                setActiveProjectId(null);
            };

            const handleAddUser = (e) => {
                e.preventDefault();
                if(!newUserName.trim() || !newUserPass.trim() || !dbUser || !db) return;
                const uname = newUserName.trim().toUpperCase();
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'systemUsers', uname), {
                    password: newUserPass.trim(),
                    role: 'user'
                }).catch(console.error);
                setNewUserName('');
                setNewUserPass('');
            };

            const deleteUser = (uname) => {
                if(uname === 'ADMIN1' || !dbUser || !db) return;
                deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'systemUsers', uname)).catch(console.error);
            };

            const createNewProject = () => {
                const newProject = {
                    id: Date.now().toString(),
                    name: 'פרויקט / תיקייה חדשה',
                    description: '',
                    status: 'רעיון',
                    priority: 'בינונית',
                    tasks: [],
                    codeSnippet: '',
                    logs: [addLog(Date.now().toString(), 'יצר פרויקט חדש')],
                    allowedUsers: Array.from(new Set(['ADMIN1', loggedInUser])),
                    deleteRequested: false,
                    deleteRequestedBy: ''
                };
                
                setProjects([newProject, ...projects]);
                saveProjectToCloud(newProject);
                setActiveProjectId(newProject.id);
            };

            const updateProject = (id, field, value) => {
                let actionDesc = '';
                if (field === 'status') actionDesc = `שינה סטטוס ל-${value}`;
                if (field === 'priority') actionDesc = `שינה עדיפות ל-${value}`;
                if (field === 'codeSnippet') actionDesc = `ערך את כספת הקוד`;
                if (field === 'name') actionDesc = `שינה שם ל-${value}`;
                if (field === 'description') actionDesc = `עדכן תיאור פרויקט`;
                if (field === 'allowedUsers') actionDesc = `שינה הרשאות צפייה לפרויקט`;

                setProjects(projects.map(p => {
                    if (p.id === id) {
                        const updatedProject = { ...p, [field]: value };
                        if (actionDesc) {
                           updatedProject.logs = [addLog(id, actionDesc), ...(p.logs || [])].slice(0, 50);
                        }
                        saveProjectToCloud(updatedProject);
                        return updatedProject;
                    }
                    return p;
                }));
            };

            const confirmDeleteProject = (project) => {
                if (!project) return;
                if (loggedInUser === 'ADMIN1' || loggedInRole === 'superadmin') {
                    setProjectToDelete(project);
                } else {
                    setDeleteRequestModalProject(project);
                }
            };

            const executeDeleteProject = () => {
                if (projectToDelete && dbUser && db) {
                    deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', projectToDelete.id)).catch(console.error);
                    if (activeProjectId === projectToDelete.id) {
                        setActiveProjectId(null);
                    }
                    setProjectToDelete(null);
                }
            };

            const requestDeleteProject = () => {
                if (deleteRequestModalProject) {
                    setProjects(projects.map(p => {
                        if (p.id === deleteRequestModalProject.id) {
                            const updatedProject = { ...p, deleteRequested: true, deleteRequestedBy: loggedInUser };
                            updatedProject.logs = [addLog(p.id, `ביקש אישור מחיקה לפרויקט`), ...(p.logs || [])].slice(0, 50);
                            saveProjectToCloud(updatedProject);
                            return updatedProject;
                        }
                        return p;
                    }));
                    setDeleteRequestModalProject(null);
                }
            };

            const approveDeleteProject = (project) => {
                if(!dbUser || !db || !project) return;
                deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'projects', project.id)).catch(console.error);
                if (activeProjectId === project.id) setActiveProjectId(null);
            };

            const rejectDeleteProject = (project) => {
                if(!project) return;
                setProjects(projects.map(p => {
                    if (p.id === project.id) {
                        const updatedProject = { ...p, deleteRequested: false, deleteRequestedBy: '' };
                        updatedProject.logs = [addLog(p.id, `ADMIN1 דחה את בקשת המחיקה`), ...(p.logs || [])].slice(0, 50);
                        saveProjectToCloud(updatedProject);
                        return updatedProject;
                    }
                    return p;
                }));
            };

            const addTask = (projectId, taskText, dueDate, category) => {
                if (!taskText || !taskText.trim()) return;
                const newTask = { 
                    id: Date.now().toString() + Math.random().toString(36).substr(2, 9), 
                    text: taskText, 
                    isDone: false,
                    dueDate: dueDate || null,
                    category: category || 'general'
                };
                
                setProjects(projects.map(p => {
                    if (p.id === projectId) {
                        const tasks = Array.isArray(p.tasks) ? p.tasks : [];
                        const updatedProject = { ...p, tasks: [...tasks, newTask] };
                        updatedProject.logs = [addLog(projectId, `הוסיף משימה: "${taskText}"`), ...(p.logs || [])].slice(0, 50);
                        saveProjectToCloud(updatedProject);
                        return updatedProject;
                    }
                    return p;
                }));
            };

            const toggleTask = (projectId, taskId) => {
                setProjects(projects.map(p => {
                    if (p.id === projectId) {
                        const tasks = Array.isArray(p.tasks) ? p.tasks : [];
                        const task = tasks.find(t => t.id === taskId);
                        if (!task) return p;
                        const newState = !task.isDone;
                        const actionDesc = newState ? `סיים משימה: "${task.text}"` : `החזיר משימה לעבודה: "${task.text}"`;
                        
                        const updatedProject = {
                            ...p,
                            tasks: tasks.map(t => t.id === taskId ? { ...t, isDone: newState } : t)
                        };
                        updatedProject.logs = [addLog(projectId, actionDesc), ...(p.logs || [])].slice(0, 50);
                        saveProjectToCloud(updatedProject);
                        return updatedProject;
                    }
                    return p;
                }));
            };

            const deleteTask = (projectId, taskId) => {
                setProjects(projects.map(p => {
                    if (p.id === projectId) {
                        const tasks = Array.isArray(p.tasks) ? p.tasks : [];
                        const task = tasks.find(t => t.id === taskId);
                        const updatedProject = { ...p, tasks: tasks.filter(t => t.id !== taskId) };
                        updatedProject.logs = [addLog(projectId, `מחק משימה: "${task?.text || ''}"`), ...(p.logs || [])].slice(0, 50);
                        saveProjectToCloud(updatedProject);
                        return updatedProject;
                    }
                    return p;
                }));
            };

            const visibleProjects = projects.filter(p => {
                if (!p) return false;
                if (loggedInUser === 'ADMIN1' || loggedInRole === 'superadmin') return true;
                return p.allowedUsers ? p.allowedUsers.includes(loggedInUser) : true;
            });
            
            const filteredProjects = visibleProjects.filter(p => p && p.name && p.name.includes(searchTerm));
            const activeProject = visibleProjects.find(p => p && p.id === activeProjectId);

            const getPriorityColor = (priority) => {
                switch(priority) {
                    case 'גבוהה': return 'bg-red-100 text-red-800 border-red-200';
                    case 'בינונית': return 'bg-yellow-100 text-yellow-800 border-yellow-200';
                    case 'נמוכה': return 'bg-blue-100 text-blue-800 border-blue-200';
                    default: return 'bg-gray-100 text-gray-800 border-gray-200';
                }
            };

            const getStatusColor = (status) => {
                switch(status) {
                    case 'הושלם': return 'bg-green-100 text-green-800 border-green-200';
                    case 'בעבודה': return 'bg-purple-100 text-purple-800 border-purple-200';
                    case 'רעיון': return 'bg-gray-100 text-gray-800 border-gray-200';
                    default: return 'bg-gray-100 text-gray-800 border-gray-200';
                }
            };

            const getCategoryIcon = (category) => {
                switch(category) {
                    case 'meeting': return <i className="fas fa-briefcase text-purple-500"></i>;
                    case 'phone': return <i className="fas fa-phone-alt text-emerald-500"></i>;
                    case 'errand': return <i className="fas fa-shopping-cart text-orange-500"></i>;
                    case 'code': return <i className="fas fa-code text-blue-500"></i>;
                    default: return <i className="fas fa-tag text-slate-400"></i>;
                }
            };

            if (!loggedInUser) {
                return (
                    <div className="min-h-screen bg-slate-100 flex flex-col justify-center items-center font-sans">
                        <div className="bg-white p-10 rounded-3xl shadow-xl max-w-md w-full border border-slate-200">
                            <div className="flex justify-center mb-6">
                                <div className="bg-blue-100 p-5 rounded-full flex items-center justify-center">
                                    <i className="fas fa-lock text-3xl text-blue-600"></i>
                                </div>
                            </div>
                            <h1 className="text-3xl font-bold text-center text-slate-800 mb-2">מערכת ניהול משימות</h1>
                            <p className="text-center text-slate-500 mb-8">התחבר למערכת המאובטחת</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">שם משתמש</label>
                                    <input 
                                        type="text" 
                                        value={usernameInput}
                                        onChange={(e) => setUsernameInput(e.target.value.toUpperCase())}
                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-left font-mono"
                                        placeholder="הזן שם משתמש"
                                        required
                                        dir="ltr"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-700 mb-1">סיסמה</label>
                                    <input 
                                        type="password" 
                                        value={passwordInput}
                                        onChange={(e) => setPasswordInput(e.target.value)}
                                        className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-left font-mono"
                                        placeholder="••••••"
                                        required
                                        dir="ltr"
                                    />
                                </div>
                                
                                {loginError && <p className="text-red-500 text-sm text-center font-medium bg-red-50 p-2 rounded-lg">{loginError}</p>}
                                
                                <button 
                                    type="submit" 
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-colors shadow-md mt-4"
                                >
                                    התחבר למערכת
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen bg-slate-50 overflow-hidden">
                    
                    {showUserModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-50 backdrop-blur-sm">
                            <div className="bg-white p-6 rounded-2xl shadow-2xl max-w-md w-full mx-4 modal-enter border border-slate-100">
                                <div className="flex justify-between items-center mb-6 border-b pb-3 border-slate-100">
                                    <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                        <i className="fas fa-users-cog text-blue-500"></i>
                                        ניהול משתמשים והרשאות
                                    </h3>
                                    <button onClick={() => setShowUserModal(false)} className="text-slate-400 hover:text-slate-600 focus:outline-none"><i className="fas fa-times text-xl"></i></button>
                                </div>
                                
                                <form onSubmit={handleAddUser} className="mb-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                    <h4 className="font-bold text-sm mb-3 text-slate-700">יצירת משתמש חדש</h4>

                                <div className="max-w-4xl mx-auto pb-10">
                                    <div className="flex items-center gap-4 mb-8">
                                        <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-4 rounded-2xl shadow-lg text-white"><i className="fas fa-chart-line text-3xl"></i></div>
                                        <div>
                                            <h2 className="text-2xl font-bold text-slate-800">לוח משימות גלובלי</h2>
                                            <p className="text-slate-500 font-medium">המשימות הפתוחות מהפרויקטים שלך.</p>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8">
                                        <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2 border-b border-slate-100 pb-4"><i className="fas fa-check-circle text-blue-500"></i> לביצוע</h3>
                                        
                                        <div className="space-y-3">
                                            {visibleProjects.flatMap(p => (Array.isArray(p?.tasks) ? p.tasks : []).filter(t => !t.isDone).map(t => ({...t, projectName: p.name, projectId: p.id})))
                                                .sort((a, b) => {
                                                    if (!a.dueDate) return 1;
                                                    if (!b.dueDate) return -1;
                                                    return new Date(a.dueDate) - new Date(b.dueDate);
                                                }).map(task => (
                                                    <div key={task.id} className="flex items-center justify-between group bg-white hover:bg-slate-50 p-4 rounded-2xl transition-all border border-slate-100 shadow-sm hover:shadow-md">
                                                        <div className="flex items-start gap-4">
                                                            <button onClick={() => toggleTask(task.projectId, task.id)} className="text-slate-300 hover:text-green-500 focus:outline-none transition-colors mt-0.5"><i className="far fa-circle text-2xl"></i></button>
                                                            <div className="flex flex-col">
                                                                <span className="text-base font-bold text-slate-700 mb-1">{task.text}</span>
                                                                <div className="flex items-center flex-wrap gap-2">
                                                                    <button onClick={() => setActiveProjectId(task.projectId)} className="text-[11px] bg-blue-50 hover:bg-blue-100 text-blue-700 px-2.5 py-1 rounded-full font-bold transition-colors border border-blue-200 flex items-center gap-1"><i className="fas fa-folder"></i>{task.projectName}</button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        {task.dueDate && (
                                                            <div className={`flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg border shadow-sm ${isOverdue(task.dueDate) ? 'bg-red-50 text-red-700 border-red-200 font-bold' : 'bg-white text-slate-600 border-slate-200 font-medium'}`}>
                                                                {isOverdue(task.dueDate) ? <i className="fas fa-exclamation-circle"></i> : <i className="far fa-calendar-alt"></i>}{new Date(task.dueDate).toLocaleDateString('he-IL')}
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            {visibleProjects.flatMap(p => (Array.isArray(p?.tasks) ? p.tasks : []).filter(t => !t.isDone)).length === 0 && (
                                                <div className="text-center py-10 text-slate-500">
                                                    <i className="fas fa-glass-cheers text-4xl mb-4 text-emerald-400"></i>
                                                    <p className="font-medium text-lg">אין לך משימות פתוחות בכלל.</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
